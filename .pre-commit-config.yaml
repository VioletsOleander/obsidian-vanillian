repos:
  - repo: local
    hooks:
      - id: check-format
        name: Check Format
        entry: npx dprint check --allow-no-files
        language: system
        types_or: [ts, javascript, json, yaml, markdown]
      - id: check-type
        name: Check Type
        entry: npx tsc
        language: system
        types_or: [ts]
        pass_filenames: false
      - id: lint
        name: Lint
        entry: npx eslint
        language: system
        types: [ts]
